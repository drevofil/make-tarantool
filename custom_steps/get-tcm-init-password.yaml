---
- name: Configure of a server
  become: yes
  hosts: "{{ tarantool_shared_hosts | default('all') }}"
  gather_facts: false
  vars:
    tcm_log_directory: "/app/logs/tarantool/cluster-manager"
  tasks:
    - name: Extract super admin password using grep
      shell: |
        grep -E 'msg="Generated super admin credentials".*password=' "{{ tcm_log_directory }}/tcm.log" | tail -1 | sed -n 's/.*password=\([^ ]*\).*/\1/p'
      register: password_result
      failed_when: false
      changed_when: false
    - name: Output password if found
      debug:
        msg: "Generated TCM admin password: {{ password_result.stdout }}"
      when: password_result.stdout | length > 0
    - name: Output message if not found
      debug:
        msg: "No 'Generated super admin credentials' entry with password found in log"
      when: password_result.stdout | length == 0